<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Resolve the theme before the first paint so there is no flash of the
         wrong background. Reads the same matchiq_theme key the React app uses;
         a stored 'system' (or nothing) resolves to the OS preference. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('matchiq_theme');
          var theme = (stored === 'light' || stored === 'dark')
            ? stored
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <style>
      /* Paint the real base color on the canvas itself, before React mounts,
         so the initial frame and the iOS overscroll/bounce area both match. */
      html[data-theme="dark"], html[data-theme="dark"] body { background-color: #0B0B0D; }
      html[data-theme="light"], html[data-theme="light"] body { background-color: #F5F5F2; }
    </style>
    <title>MatchIQ — football matches, read honestly</title>
    <meta name="description" content="MatchIQ reads football matches from three independent AI angles — form, history, and the betting market — and settles them into one plain-language verdict, with honest confidence and an accountable track record." />
    <link rel="icon" type="image/svg+xml" sizes="any" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#F5F5F2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B0B0D" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MatchIQ — football matches, read honestly" />
    <meta property="og:description" content="Three independent AI angles — form, history, and the market — settled into one plain-language verdict." />
    <meta property="og:image" content="https://matchiq-jade.vercel.app/og.svg" />
    <meta property="og:url" content="https://matchiq-jade.vercel.app" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
